<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — The Weekly Bullrun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1e3a5f;
    --black: #111111;
    --body-color: #222222;
    --mid: #666666;
    --light: #999999;
    --border: #cccccc;
    --subtle: #e8e8e8;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #fff;
    color: var(--black);
  }

  .container { max-width: 720px; margin: 0 auto; padding: 0 24px 64px; }

  .site-header {
    padding: 22px 0 16px;
    border-bottom: 3px double var(--black);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }

  .logo {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 28px;
    font-style: italic;
    font-weight: 700;
    color: var(--navy);
    text-decoration: none;
    letter-spacing: -0.01em;
  }

  .header-date {
    font-size: 11px;
    color: var(--light);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }

  nav {
    display: flex;
    gap: 28px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  nav a {
    font-size: 11px;
    color: var(--mid);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    transition: color 0.15s;
  }

  nav a:hover { color: var(--navy); }

  .page-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 40px;
    font-weight: 800;
    font-style: italic;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
    color: var(--black);
  }

  .about-body {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 17px;
    line-height: 1.8;
    color: var(--body-color);
  }

  .about-body p { margin-bottom: 1.4em; }

  footer {
    border-top: 3px double var(--black);
    padding-top: 16px;
    margin-top: 56px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    color: var(--light);
    letter-spacing: 0.04em;
  }

  .footer-logo {
    font-family: 'Playfair Display', Georgia, serif;
    font-style: italic;
    color: var(--navy);
    font-size: 14px;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="container">
  <header class="site-header">
    <a href="index.html" class="logo">The Weekly Bullrun</a>
    <div class="header-date" id="live-date"></div>
  </header>
  <nav>
    <a href="index.html">Home</a>
    <a href="archive.html">Archive</a>
    <a href="about.html">About</a>
  </nav>

  <h1 class="page-title">About</h1>
  <div class="about-body">
    <p>PLACEHOLDER — tell me what you want this page to say and I'll write it.</p>
  </div>

  <footer>
    <span class="footer-logo">The Weekly Bullrun</span>
    <span>© 2026 Alessio Cipriano</span>
  </footer>
</div>
<script>
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const now = new Date();
  document.getElementById('live-date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
</script>
</body>
</html>
