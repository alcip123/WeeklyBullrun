<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — The Weekly Bullrun</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #111; }
  .container { max-width: 720px; margin: 0 auto; padding: 24px 24px 48px; }
  header { border-top: 3px solid #111; border-bottom: 1px solid #ccc; padding: 12px 0; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: normal; color: #111; text-decoration: none; }
  #live-date { font-size: 11px; color: #888; letter-spacing: 0.04em; }
  nav { border-bottom: 1px solid #ccc; padding: 7px 0; display: flex; gap: 20px; margin-bottom: 32px; }
  nav a { font-size: 12px; color: #555; text-decoration: none; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 500; }
  nav a:hover { color: #111; }
  .page-title { font-family: Georgia, 'Times New Roman', serif; font-size: 28px; font-weight: normal; margin-bottom: 24px; }
  .about-body { font-family: Georgia, 'Times New Roman', serif; font-size: 17px; line-height: 1.8; color: #222; }
  .about-body p { margin-bottom: 1.4em; }
  footer { border-top: 1px solid #ccc; padding-top: 14px; margin-top: 40px; display: flex; justify-content: space-between; font-size: 11px; color: #bbb; }
</style>
</head>
<body>
<div class="container">
  <header>
    <a href="/" class="logo">The Weekly Bullrun</a>
    <div id="live-date"></div>
  </header>
  <nav>
    <a href="/">Home</a>
    <a href="archive.html">Archive</a>
    <a href="about.html">About</a>
  </nav>
  <h1 class="page-title">About</h1>
  <div class="about-body">
    <p>Coming soon. Stay tuned.</p>
  </div>
  <footer>
    <span>The Weekly Bullrun</span>
    <span>© 2026 Alessio Cipriano</span>
  </footer>
</div>
<script>
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const now = new Date();
  document.getElementById('live-date').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
</script>
</body>
</html>
